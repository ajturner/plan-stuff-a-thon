name: Deploy to gh-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site
        run: |
          rm -rf dist
          mkdir -p dist
          rsync -av --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "AGENTS.md" \
            --exclude "SPECIFICATIONS.md" \
            --exclude "README.md" \
            --exclude "dist/" \
            ./ dist/

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          force_orphan: true